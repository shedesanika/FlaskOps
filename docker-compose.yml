version: '3'

services:

  flaskapp:
    build: .
    container_name: flaskapp
    ports:
      - "5000:5000"

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flaskdb

    ports:
      - "3307:3306"